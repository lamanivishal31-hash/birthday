<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', cursive;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 35px;
      border-radius: 25px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: fadeIn 2s ease;
      max-width: 400px;
    }

    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    p { font-size: 1.1rem; margin-bottom: 15px; }

    .photo {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background: #ff1e4d; transform: scale(1.05); }

    .hidden { display: none; margin-top: 20px; font-size: 1.2rem; line-height: 1.6; }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cursor {
      display: inline-block;
      background: white;
      width: 2px;
      animation: blink 1s infinite;
      margin-left: 2px;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <!-- Background Music -->
  <audio autoplay loop>
    <source src="song.mp3.mpeg" type="audio/mpeg">
  </audio>

  <div class="card">
    <h1>Happy Birthday, My Love ❤️</h1>

    <!-- Your Photo -->
    <img src="photo.jpg.jpg" alt="Our Photo" class="photo">

    <p>To the most special person in my life 💕</p>

    <button onclick="startLoveLetter()">Open My Heart 💌</button>

    <div id="message" class="hidden">
      <span id="typedText"></span><span class="cursor"></span>
    </div>

    <div id="proposal" class="hidden">
      💍 Will you always be mine? ❤️
    </div>
  </div>

  <script>
    const text = `💖 Dear Jyo,

On your special day, I just want you to know...
You are the most beautiful part of my life ❤️
Every moment with you feels magical ✨
I am so lucky to have you 💕

Forever yours,
Vishal 💫`;;

    let i = 0;

    function startLoveLetter() {
      document.getElementById('message').style.display = 'block';
      typeWriter();
    }

    function typeWriter() {
      if (i < text.length) {
        document.getElementById('typedText').innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      } else {
        document.getElementById('proposal').style.display = 'block';
      }
    }

    // floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
